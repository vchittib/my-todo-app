<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e4e4ef;
    }

    .card {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      color: #e4e4ef;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: #4b5563; }

    input[type="text"]:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    button.add-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button.add-btn:hover { opacity: 0.9; }
    button.add-btn:active { transform: scale(0.97); }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid #2a2a38;
      background: transparent;
      color: #6b7280;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #1e1b4b;
      border-color: #7c3aed;
      color: #a78bfa;
    }

    .stats {
      font-size: 0.8rem;
      color: #4b5563;
      margin-bottom: 16px;
    }

    .stats span { color: #7c3aed; font-weight: 600; }

    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover { border-color: #3a3a50; }

    .todo-item.completed { opacity: 0.5; }

    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #3a3a50;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: transparent;
    }

    .checkbox.checked {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-color: transparent;
    }

    .checkbox.checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .todo-title {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      transition: color 0.2s;
    }

    .todo-item.completed .todo-title {
      text-decoration: line-through;
      color: #4b5563;
    }

    .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      font-size: 1rem;
      transition: color 0.2s, opacity 0.2s;
    }

    .todo-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #f87171; }

    .empty {
      text-align: center;
      padding: 48px 0;
      color: #4b5563;
      font-size: 0.9rem;
    }

    .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>My Todos</h1>
    <p class="subtitle" id="date"></p>

    <div class="input-row">
      <input type="text" id="newTodo" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
    </div>

    <p class="stats" id="stats"></p>

    <div class="todo-list" id="todoList"></div>
  </div>

  <script>
    let todos = [];
    let filter = 'all';

    document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    document.getElementById('newTodo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    async function fetchTodos() {
      const res = await fetch('/todos');
      todos = await res.json();
      render();
    }

    async function addTodo() {
      const input = document.getElementById('newTodo');
      const title = input.value.trim();
      if (!title) return;
      const res = await fetch('/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      const todo = await res.json();
      todos.push(todo);
      input.value = '';
      render();
    }

    async function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      const res = await fetch(`/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed: !todo.completed })
      });
      const updated = await res.json();
      todos = todos.map(t => t.id === id ? updated : t);
      render();
    }

    async function deleteTodo(id) {
      await fetch(`/todos/${id}`, { method: 'DELETE' });
      todos = todos.filter(t => t.id !== id);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const active = todos.filter(t => !t.completed).length;
      document.getElementById('stats').innerHTML =
        `<span>${active}</span> task${active !== 1 ? 's' : ''} remaining`;

      const visible = todos.filter(t => {
        if (filter === 'active') return !t.completed;
        if (filter === 'completed') return t.completed;
        return true;
      });

      if (visible.length === 0) {
        list.innerHTML = `<div class="empty"><div class="icon">✓</div>Nothing here yet</div>`;
        return;
      }

      list.innerHTML = visible.map(t => `
        <div class="todo-item ${t.completed ? 'completed' : ''}">
          <div class="checkbox ${t.completed ? 'checked' : ''}" onclick="toggleTodo(${t.id})"></div>
          <span class="todo-title">${escapeHtml(t.title)}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Delete">✕</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    fetchTodos();
  </script>
</body>
</html>
